<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTOCARA | Boyasız Göçük Onarım & Plastik Kaynağı</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; scroll-behavior: smooth; }
        :root { --bg-dark: #121212; --bg-card: rgba(30, 30, 30, 0.85); --accent-yellow: #ccff00; --text-light: #ffffff; --text-gray: #a0a0a0; --gold-gradient: linear-gradient(135deg, #bf953f 0%, #fcf6ba 25%, #b38728 50%, #fbf5b7 75%, #aa771c 100%); }
        body { background-color: var(--bg-dark); color: var(--text-light); line-height: 1.6; overflow-x: hidden; }
        header { position: fixed; top: 0; left: 0; width: 100%; background-color: rgba(18, 18, 18, 0.98); padding: 12px 5%; display: flex; justify-content: space-between; align-items: center; z-index: 1000; border-bottom: 1px solid #2a2a2a; }
        .brand-container { display: flex; align-items: center; gap: 10px; max-width: 100%; }
        .logo-img { height: 42px; max-width: 50px; width: auto; object-fit: contain; mix-blend-mode: screen; filter: brightness(1.2) contrast(1.1); }
        .logo { font-size: 24px; font-weight: 700; background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; }
        nav a { color: var(--text-light); text-decoration: none; margin-left: 20px; font-weight: 600; font-size: 14px; }
        .hero { height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 0 20px; background: linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.93)), url('https://i.ibb.co/Y4DB7Kcc/Gemini-Generated-mage-e34t0te34t0te34t.png'); background-size: cover; background-position: center; background-attachment: fixed; }
        .hero-content h1 { font-size: 42px; margin-bottom: 15px; }
        .hero-content h1 span { color: var(--accent-yellow); }
        .btn-main { display: inline-block; background-color: var(--accent-yellow); color: #000; padding: 15px 35px; border-radius: 50px; font-weight: 700; text-decoration: none; }
        section { padding: 100px 5%; text-align: center; }
        .services-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .service-card { background-color: var(--bg-card); padding: 40px 25px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.1); }
        
        /* GÜNCELLENEN GALERİ ALANI */
        .portfolio-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 25px; max-width: 1000px; margin: 0 auto; }
        .portfolio-item { background: rgba(30, 30, 30, 0.9); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 15px; transition: 0.3s; }
        .portfolio-item img { width: 100%; height: 300px; object-fit: contain; border-radius: 8px; }

        .contact-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; text-align: left; max-width: 1000px; margin: 0 auto; }
        .contact-info { background-color: var(--bg-card); padding: 30px; border-radius: 12px; }
        .whatsapp-fixed { position: fixed; bottom: 25px; right: 25px; background-color: #25d366; padding: 15px; border-radius: 50%; z-index: 1000; }
        @media (max-width: 768px) { nav { display: none; } .portfolio-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <header>
        <div class="brand-container">
            <img class="logo-img" src="https://i.ibb.co/MkGMhJS2/Whats-App-mage-2026-06-13-at-16-00-5sa9.jpg" alt="Logo">
            <div class="logo">Autocara</div>
        </div>
        <nav><a href="#hizmetler">Hizmetler</a><a href="#portfolyo">Öncesi / Sonrası</a><a href="#iletisim">İletişim</a></nav>
    </header>

    <section class="hero" id="home">
        <div class="hero-content">
            <h1>Aracınızın Orijinalliğini Koruyun</h1>
            <p>Profesyonel Boyasız Göçük Onarımı (PDR)</p>
            <a href="https://wa.me/message/W2IYK35W2RFED1" class="btn-main">📸 Fotoğraf Gönder, Fiyat Al</a>
        </div>
    </section>

    <section id="hizmetler">
        <h2>Neler Yapıyoruz?</h2>
        <div class="services-grid">
            <div class="service-card"><h3>PDR</h3><p>Boyasız göçük onarımı.</p></div>
            <div class="service-card"><h3>Plastik Kaynak</h3><p>Tampon ve bakalit onarımı.</p></div>
            <div class="service-card"><h3>3D Üretim</h3><p>Özel parça üretimi.</p></div>
        </div>
    </section>

    <section id="portfolyo">
        <h2>İşçilik Kalitemiz</h2>
        <div class="portfolio-grid">
            <div class="portfolio-item"><img src="https://i.ibb.co/7xjg0TVN/Whats-App-mage-2026-06-14-at-17-14-30-1.jpg"></div>
            <div class="portfolio-item"><img src="https://i.ibb.co/JWHjz3RB/Whats-App-mage-2026-06-14-at-17-14-30-2.jpg"></div>
            <div class="portfolio-item"><img src="https://i.ibb.co/7wfTcPW/Whats-App-mage-2026-06-14-at-17-14-30.jpg"></div>
            <div class="portfolio-item"><img src="https://i.ibb.co/wr4G3XSg/Whats-App-mage-2026-06-14-at-17-16-21.jpg"></div>
        </div>
    </section>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const target = document.getElementById('hizmetler');
                window.scrollTo({ top: target.offsetTop - 70, behavior: 'smooth' });
            }, 1200); 
        });
    </script>
</body>
</html>
