<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTOCARA | Boyasız Göçük Onarım & Plastik Kaynağı</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Temel Renkler ve Font */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            scroll-behavior: smooth;
        }

        :root {
            --bg-dark: #121212;
            --bg-card: rgba(30, 30, 30, 0.85); 
            --accent-yellow: #ccff00; /* PDR Işık Sarısı */
            --text-light: #ffffff;
            --text-gray: #a0a0a0;
            --gold-gradient: linear-gradient(135deg, #bf953f 0%, #fcf6ba 25%, #b38728 50%, #fbf5b7 75%, #aa771c 100%);
        }

        /* Varsayılan Mobil/Genel Arka Plan Ayarı */
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.95)), 
                        url('https://i.ibb.co/Y4DB7Kcc/Gemini-Generated-mage-e34t0te34t0te34t.png') no-repeat top center;
            background-size: contain; /* Görselin tamamı mobil ekrana sığsın */
            background-color: var(--bg-dark);
            color: var(--text-light);
            line-height: 1.6;
        }

        /* Üst Menü (Header) */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: rgba(18, 18, 18, 0.95);
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            border-bottom: 1px solid #2a2a2a;
        }

        /* Altın Varaklı Logo Tasarımı */
        .logo {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 2px;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 2px 4px rgba(0, 0, 0, 0.5));
            text-transform: uppercase;
        }

        nav a {
            color: var(--text-light);
            text-decoration: none;
            margin-left: 20px;
            font-weight: 600;
            font-size: 14px;
            transition: 0.3s;
        }

        nav a:hover {
            color: var(--accent-yellow);
        }

        /* Giriş Ekranı (Hero Section) */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 20px;
            background: transparent;
        }

        .hero-content h1 {
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 15px;
            line-height: 1.2;
            text-shadow: 0 4px 10px rgba(0,0,0,0.7);
        }

        .hero-content h1 span {
            color: var(--accent-yellow);
        }

        .hero-content p {
            font-size: 18px;
            color: var(--text-gray);
            max-width: 600px;
            margin: 0 auto 30px auto;
            text-shadow: 0 2px 5px rgba(0,0,0,0.7);
        }

        /* Butonlar */
        .btn-main {
            display: inline-block;
            background-color: var(--accent-yellow);
            color: #000;
            padding: 15px 35px;
            border-radius: 50px;
            font-weight: 700;
            text-decoration: none;
            font-size: 16px;
            transition: 0.3s transform ease;
            box-shadow: 0 4px 15px rgba(204, 255, 0, 0.3);
        }

        .btn-main:hover {
            transform: scale(1.05);
        }

        /* Sayfa Bölümleri Genel */
        section {
            padding: 100px 5%;
            text-align: center;
        }

            margin-bottom: 40px;
