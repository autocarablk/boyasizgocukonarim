<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTOCARA | Boyasız Göçük Onarım & Plastik Kaynağı</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Temel Renkler ve Font */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            scroll-behavior: smooth;
        }

        :root {
            --bg-dark: #121212;
            --bg-card: rgba(30, 30, 30, 0.85); 
            --accent-yellow: #ccff00; /* PDR Işık Sarısı */
            --text-light: #ffffff;
            --text-gray: #a0a0a0;
            --gold-gradient: linear-gradient(135deg, #bf953f 0%, #fcf6ba 25%, #b38728 50%, #fbf5b7 75%, #aa771c 100%);
        }

        /* Tüm Cihazlar İçin Güvenli Arka Plan Yapısı */
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.96)), 
                        url('https://i.ibb.co/Y4DB7Kcc/Gemini-Generated-mage-e34t0te34t0te34t.png');
            background-repeat: no-repeat;
            background-position: center top;
            background-size: cover;
            background-attachment: scroll; 
            background-color: var(--bg-dark);
            color: var(--text-light);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Üst Menü (Header) */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: rgba(18, 18, 18, 0.98);
            padding: 12px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            border-bottom: 1px solid #2a2a2a;
        }

        /* Logo ve Araba Vektörü Kapsayıcısı */
        .brand-container {
            display: flex;
            align-items: center;
            gap: 10px;
            max-width: 100%;
        }

        /* Logodan Siyah Arka Planı Ayıklayan ve Ekrana Sığdıran CSS */
        .logo-img {
            height: 42px;
            max-width: 50px;
            width: auto;
            object-fit: contain;
            flex-shrink: 0; 
            mix-blend-mode: screen; 
            filter: brightness(1.2) contrast(1.1); 
            display: block;
        }

        /* Altın Varaklı Yazı Tasarımı */
        .logo {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 1.5px;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 2px 4px rgba(0, 0, 0, 0.5));
            text-transform: uppercase;
            white-space: nowrap;
        }

        nav a {
            color: var(--text-light);
            text-decoration: none;
            margin-left: 20px;
            font-weight: 600;
            font-size: 14px;
            transition: 0.3s;
        }

        nav a:hover {
            color: var(--accent-yellow);
        }

        /* Giriş Ekranı (Hero Section) */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 20px;
            background: transparent;
        }

        .hero-content h1 {
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 15px;
            line-height: 1.2;
            text-shadow: 0 4px 10px rgba(0,0,0,0.7);
        }

        .hero-content h1 span {
            color: var(--accent-yellow);
        }

        .hero-content p {
            font-size: 18px;
            color: var(--text-gray);
            max-width: 600px;
            margin: 0 auto 30px auto;
            text-shadow: 0 2px 5px rgba(0,0,0,0.7);
        }

        /* Butonlar */
        .btn-main {
            display: inline-block;
            background-color: var(--accent-yellow);
            color: #000;
            padding: 15px 35px;
            border-radius: 50px;
            font-weight: 700;
            text-decoration: none;
            font-size: 16px;
            transition: 0.3s transform ease;
            box-shadow: 0 4px 15px rgba(204, 255, 0, 0.3);
        }

        .btn-main:hover {
            transform: scale(1.05);
        }

        /* Sayfa Bölümleri Genel */
        section {
            padding: 100px 5%;
            text-align: center;
        }

        section h2 {
            font-size: 32px;
            margin-bottom: 40px;
            position: relative;
            text-shadow: 0 2px 8px rgba(0,0,0,0.8);
        }

        section h2::after {
            content: '';
            display: block;
            width: 50px;
            height: 3px;
            background-color: var(--accent-yellow);
            margin: 10px auto 0 auto;
        }

        /* Hizmetlerimiz Bölümü */
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }

        .service-card {
            background-color: var(--bg-card);
            padding: 40px 25px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        .service-card:hover {
            border-color: var(--accent-yellow);
            transform: translateY(-5px);
            background-color: rgba(30, 30, 30, 0.95);
        }

        .service-card h3 {
            font-size: 21px;
            margin-bottom: 15px;
            color: var(--text-light);
        }

        .service-card p {
            color: var(--text-gray);
            font-size: 14px;
        }

        /* Tam Boy 4 Parça Portfolyo Yapısı */
        .portfolio-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 35px;
            max-width: 800px;
            margin: 0 auto;
        }

        .portfolio-item {
            background: rgba(25, 25, 25, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            overflow: hidden;
            width: 100%;
            position: relative;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            transition: border-color 0.3s;
        }

        .portfolio-item:hover {
            border-color: rgba(204, 255, 0, 0.4);
        }

        .portfolio-item img {
            width: 100%;
            height: auto;
            max-height: 500px;
            object-fit: cover;
            display: block;
        }

        .status-badge {
            position: absolute;
            bottom: 15px;
            left: 15px;
            padding: 6px 16px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .status-badge.before {
            background: rgba(220, 53, 69, 0.95); /* Kırmızı tonlu öncesi */
            color: #fff;
        }

        .status-badge.after {
            background: var(--accent-yellow); /* Işık sarısı sonrası */
            color: #000;
        }

        /* İletişim Bölümü */
        .contact-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            text-align: left;
            max-width: 1000px;
            margin: 0 auto;
        }

        .contact-info {
            background-color: var(--bg-card);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        .contact-info h3 {
            font-size: 24px;
            margin-bottom: 20px;
            color: var(--accent-yellow);
        }

        .contact-info p {
            margin-bottom: 10px;
            color: var(--text-gray);
        }

        .social-media-box {
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .social-media-box p {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-light);
            margin-bottom: 12px;
        }

        .social-links {
            display: flex;
            gap: 12px;
        }

        .social-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: rgba(18, 18, 18, 0.8);
            color: var(--text-light);
            padding: 10px 18px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid #333;
            transition: 0.3s;
        }

        .social-btn.instagram:hover { border-color: #e1306c; color: #e1306c; background-color: rgba(225, 48, 108, 0.1); }
        .social-btn.tiktok:hover { border-color: #ff0050; color: #ff0050; background-color: rgba(255, 0, 80, 0.1); }
        .social-btn.facebook:hover { border-color: #1877f2; color: #1877f2; background-color: rgba(24, 119, 242, 0.1); }

        .map-container iframe {
            width: 100%;
            height: 380px;
            border: 0;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* Sabit WhatsApp Butonu */
        .whatsapp-fixed {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background-color: #25d366;
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            z-index: 1000;
            transition: 0.3s transform ease;
        }

        .whatsapp-fixed svg {
            width: 28px;
            height: 28px;
            fill: #ffffff;
        }

        .whatsapp-fixed:hover {
            transform: scale(1.1);
        }

        /* Footer */
        footer {
            background-color: rgba(11, 11, 11, 0.95);
            padding: 25px 5%;
            text-align: center;
            font-size: 13px;
            color: var(--text-gray);
            border-top: 1px solid #1a1a1a;
        }

        footer span {
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        @media (min-width: 769px) {
            body {
                background-attachment: fixed;
                background-size: cover;
            }
        }

        /* MOBİL UYUM */
        @media (max-width: 768px) {
            body {
                background-attachment: scroll; 
                background-size: contain; 
                background-position: center top; 
            }
            header { 
                padding: 10px 4%; 
                justify-content: center; 
            }
            nav { display: none; } 
            
            .brand-container { 
                gap: 8px; 
                justify-
